<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動画かみくだきAI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 24px;
      background: #fff7ed;
      color: #1f2937;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      line-height: 1.7;
    }
    textarea {
      width: 100%;
      min-height: 260px;
      padding: 14px;
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #f97316;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }
    button:disabled {
      opacity: 0.6;
    }
    .result {
      margin-top: 22px;
      padding: 18px;
      background: white;
      border-radius: 16px;
      white-space: pre-wrap;
      line-height: 1.7;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🧠 動画かみくだきAI</h1>
    <p>
      YouTubeの文字起こしを貼るだけで、<br>
      俺向けに分かりやすく要約するやつ。
    </p>

    <p class="hint">
      YouTube → 動画説明欄付近の「文字起こしを表示」→ コピー → ここに貼る
    </p>

    <textarea id="transcript" placeholder="ここにYouTubeの文字起こしを貼って"></textarea>

    <button id="btn" onclick="summarize()">要約する</button>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    async function summarize() {
      const transcript = document.getElementById("transcript").value.trim();
      const result = document.getElementById("result");
      const btn = document.getElementById("btn");

      if (!transcript) {
        result.style.display = "block";
        result.textContent = "文字起こしを貼ってから押してな！";
        return;
      }

      btn.disabled = true;
      btn.textContent = "要約中...";
      result.style.display = "block";
      result.textContent = "読み込み中やで...";

      try {
        const res = await fetch("/api/summarize", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ transcript })
        });

        const data = await res.json();

        if (!data.ok) {
          result.textContent = "エラー: " + (data.error || "原因不明");
        } else {
          result.textContent = data.summary;
        }
      } catch (e) {
        result.textContent = "通信エラー: " + e.message;
      }

      btn.disabled = false;
      btn.textContent = "要約する";
    }
  </script>
</body>
</html>
